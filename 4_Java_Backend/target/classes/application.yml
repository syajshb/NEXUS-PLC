server:
  port: 8080

spring:
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:mysql://localhost:3306/industrial_monitor?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  type-aliases-package: com.project.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.project: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
